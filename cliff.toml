[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | lower }}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}\
                    /compare/{{ release.previous.version }}..{{ release.version }}
        {% else -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}\
                    /tree/{{ release.version }}
        {% endif -%}
    {% else -%}
        [unreleased]: https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}\
            /compare/{{ release.previous.version }}..HEAD
    {% endif -%}
{% endfor %}
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
	{ message = "^feat", group = "<!-- 0 -->🚀 Features" },
	{ message = "^[a|A]dd", group = "<!-- 0 -->🚀 Features" },
	{ message = "^[s|S]upport", group = "<!-- 0 -->🚀 Features" },
	{ message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
	{ message = "^doc", group = "<!-- 2 -->📚 Documentation" },
	{ message = "^perf", group = "<!-- 3 -->🚜 Refactor" },
	{ message = "^refactor", group = "<!-- 3 -->🚜 Refactor" },
	{ message = "^style", group = "<!-- 3 -->🚜 Refactor" },
	{ message = "^test", group = "<!-- 4 -->🧪 Testing" },
	{ message = "^chore\\(release\\): bump version to", skip = true },
	{ message = "^chore\\(deps.*\\)", skip = true },
	{ message = "^chore\\(pr\\)", skip = true },
	{ message = "^chore\\(pull\\)", skip = true },
	{ message = "^revert", group = "<!-- 5 -->◀️ Revert" },
	{ message = "^[r|R]emove", group = "<!-- 5 -->◀️ Revert" },
	{ message = "^.*: remove", group = "<!-- 5 -->◀️ Revert" },
	{ message = "^.*: delete", group = "<!-- 5 -->◀️ Revert" },
	{ message = "^chore|^ci", group = "<!-- 6 -->💼 Other" },
	{ message = ".*", group = "<!-- 6 -->💼 Other" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"
